spring:
  application:
    name: service
  datasource:
    url: "jdbc:h2:mem:appdb;DB_CLOSE_DELAY=-1"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true          # dev only — /h2-console
  jpa:
    hibernate:
      ddl-auto: none         # Liquibase is the sole schema owner; Hibernate does NOT touch or validate it
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
